<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Fashion Creator - Crie seu estilo</title>
    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Personalize sua personagem, escolha roupas, maquiagem e acessórios no Urban Fashion Creator.">
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app" class="app-container">
        <!-- Main Game Area -->
        <main class="game-main">
            <!-- Left Side: Character Preview -->
            <section class="character-section">
                <div id="character-canvas" class="character-preview">
                    <!-- Background Layer (1) -->
                    <div id="game-bg" class="layer bg-layer"></div>
                    <!-- Dynamic Image Layers (Skin to Accessories) -->
                    <div id="layers-container">
                        <!-- JS will inject layers here -->
                    </div>
                </div>

                <!-- Feedback overlay for transitions -->
                <div id="completion-overlay" class="completion-overlay hidden">
                    <div class="completion-content">
                        <h2>Look Completo!</h2>
                        <p>Você está pronta para arrasar na cidade.</p>
                        <button id="reset-btn" class="secondary-button">Criar outro Look</button>
                    </div>
                </div>
            </section>

            <!-- Right Side: Menu / Control Panel -->
            <aside class="ui-sidebar">
                <header class="ui-header">
                    <h1>Urban Fashion</h1>
                    <p>Coleção Primavera / Verão</p>
                </header>

                <nav class="categories-nav">
                    <!-- Categories will be generated by script.js -->
                </nav>

                <div class="items-area">
                    <div id="items-grid" class="items-grid">
                        <!-- Items will be generated by script.js -->
                    </div>
                </div>

                <footer class="ui-footer">
                    <button id="finish-btn" class="primary-button">Pronta para Sair</button>
                </footer>
            </aside>
        </main>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
