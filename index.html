<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion 3D Experience - Urban Fashion</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Personalize sua modelo humana em 3D. Escolha rostos, roupas e acessórios.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- External Libraries -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.2/index.js"
        }
    }
    </script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app" class="app-container">
        <!-- Loader -->
        <div id="loader" class="loader-overlay">
            <div class="loader-content">
                <h2 class="loader-title">Urban Fashion 3D</h2>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <p>Preparando Estúdio...</p>
            </div>
        </div>

        <main class="game-viewport">
            <canvas id="three-canvas"></canvas>

            <div id="completion-overlay" class="completion-overlay hidden">
                <div class="completion-card">
                    <h2>Desfile Completo!</h2>
                    <p>O look está pronto para a passarela.</p>
                    <button id="reset-btn" class="secondary-button">Criar Outro</button>
                </div>
            </div>
        </main>

        <aside class="ui-panel">
            <header class="ui-header">
                <h1>Urban Fashion</h1>
                <p>COLEÇÃO PRIMAVERA / VERÃO</p>
            </header>

            <!-- Categorias baseadas no seu screenshot -->
            <nav class="categories-tabs">
                <button class="tab-btn active" data-category="skin">Pele</button>
                <button class="tab-btn" data-category="makeup">Maquiagem</button>
                <button class="tab-btn" data-category="nails">Unhas</button>
                <button class="tab-btn" data-category="outfit">Roupas</button>
                <button class="tab-btn" data-category="shoes">Sapatos</button>
                <button class="tab-btn" data-category="hair">Cabelo</button>
                <button class="tab-btn" data-category="accessories">Acessórios</button>
            </nav>

            <div class="options-container">
                <div id="options-grid" class="options-grid">
                    <!-- Rostos e Itens injetados aqui -->
                </div>
            </div>

            <footer class="ui-footer">
                <button id="finish-btn" class="primary-button">Pronta para Sair</button>
            </footer>
        </aside>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
